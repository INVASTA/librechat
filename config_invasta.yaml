version: 1.0.0

cache: true

registration:
  socialLogins:
    - "discord"
    - "facebook"
    - "github"
    - "google"
    - "openid"

endpoints:
  custom:
    # APIpie
    # https://apipie.ai/dashboard/
    # Script to fetch models: https://github.com/LibreChat-AI/librechat-config-yaml/blob/main/scripts/apipie.py
    - name: "APIpie"
      apiKey: "${APIPIE_API_KEY}"
      baseURL: "https://apipie.ai/v1/"
      models:
        default:
          - DeepSeek-R1
      fetch: false
      titleConvo: true
      titleModel: "claude-3-haiku"
      summarize: false
      summaryModel: "claude-3-haiku"
      dropParams:
        - "stream"
      modelDisplayLabel: "APIpie"
      iconURL: "https://raw.githubusercontent.com/fuegovic/lc-config-yaml/main/icons/APIpie.png"

    # deepseek
    # https://platform.deepseek.com/api_keys
    # Model list: https://platform.deepseek.com/api-docs/pricing
    - name: "deepseek"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com"
      models:
        default:
          - deepseek-chat
          - deepseek-reasoner
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      summarize: false
      summaryModel: "deepseek-chat"
      modelDisplayLabel: "DeepSeek"

    # groq
    # Model list: https://console.groq.com/settings/limits
    - name: "groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1/"
      models:
        default:
          - allam-2-7b
          - compound-beta
          - compound-beta-mini
          - deepseek-r1-distill-llama-70b
          - gemma2-9b-it
          - llama-3.1-8b-instant
          - llama-3.3-70b-versatile
          - llama-guard-3-8b
          - llama3-70b-8192
          - llama3-8b-8192
          - meta-llama/llama-4-maverick-17b-128e-instruct
          - meta-llama/llama-4-scout-17b-16e-instruct
          - mistral-saba-24b
          - playai-tts
          - playai-tts-arabic
          - qwen-qwq-32b
        fetch: false
      titleConvo: true
      titleModel: "mixtral-8x7b-32768"
      modelDisplayLabel: "groq"

    # Mistral AI API
    # Model list: https://docs.mistral.ai/getting-started/models/
    - name: "Mistral"
      apiKey: "${MISTRAL_API_KEY}"
      baseURL: "https://api.mistral.ai/v1"
      models:
        default:
          - codestral-2405
          - codestral-2411-rc5
          - codestral-2412
          - codestral-2501
          - codestral-latest
          - codestral-mamba-2407
          - codestral-mamba-latest
          - ministral-3b-2410
          - ministral-3b-latest
          - ministral-8b-2410
          - ministral-8b-latest
          - mistral-embed
          - mistral-large-2402
          - mistral-large-2407
          - mistral-large-2411
          - mistral-large-latest
          - mistral-large-pixtral-2411
          - mistral-medium
          - mistral-medium-2312
          - mistral-medium-latest
          - mistral-moderation-2411
          - mistral-moderation-latest
          - mistral-ocr-2503
          - mistral-ocr-latest
          - mistral-saba-2502
          - mistral-saba-latest
          - mistral-small
          - mistral-small-2312
          - mistral-small-2402
          - mistral-small-2409
          - mistral-small-2501
          - mistral-small-2503
          - mistral-small-latest
          - mistral-tiny
          - mistral-tiny-2312
          - mistral-tiny-2407
          - mistral-tiny-latest
          - open-codestral-mamba
          - open-mistral-7b
          - open-mistral-nemo
          - open-mistral-nemo-2407
          - open-mixtral-8x22b
          - open-mixtral-8x22b-2404
          - open-mixtral-8x7b
          - pixtral-12b
          - pixtral-12b-2409
          - pixtral-12b-latest
          - pixtral-large-2411
          - pixtral-large-latest
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "mistral-tiny"
      summarize: false
      summaryModel: "mistral-tiny"
      forcePrompt: false
      modelDisplayLabel: "Mistral"
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"

    # xAI
    # https://x.ai/api
    - name: "xai"
      apiKey: "${XAI_API_KEY}"
      baseURL: "https://api.x.ai/v1"
      models:
        default:
          - grok-2-1212
          - grok-2-vision-1212
          - grok-3-beta
          - grok-3-mini-beta
          - grok-beta
          - grok-vision-beta
        fetch: false
      titleConvo: true
      titleMethod: "completion"
      titleModel: "grok-beta"
      summarize: false
      summaryModel: "grok-beta"
      forcePrompt: false
      modelDisplayLabel: "Grok"
